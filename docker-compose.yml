version: "3.9"

# GraphFraud demo - production-ready POC.
# 2 services orchestrated:
#   - graphfraud (Next.js frontend on host port 3044)
#   - graphfraud-backend (FastAPI Python, internal only on 8000)
# Internal network so the frontend can reach the backend by service name.

services:
  graphfraud-backend:
    image: ghcr.io/wikolabs/graphfraud-backend:latest
    container_name: graphfraud-backend
    restart: unless-stopped
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    networks:
      - graphfraud-net

  graphfraud:
    image: ghcr.io/wikolabs/graphfraud:latest
    container_name: graphfraud
    restart: unless-stopped
    ports:
      - "3044:3000"
    environment:
      BACKEND_URL: "http://graphfraud-backend:8000"
    depends_on:
      - graphfraud-backend
    networks:
      - graphfraud-net

networks:
  graphfraud-net:
    name: graphfraud-net
    driver: bridge
